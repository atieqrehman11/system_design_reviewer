<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#282c34"/>
  
  <!-- Design/Architecture icon - Blueprint style -->
  <!-- Grid lines -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="40" x2="70" y2="40" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="50" x2="70" y2="50" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="60" x2="70" y2="60" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="70" x2="70" y2="70" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  
  <line x1="30" y1="30" x2="30" y2="70" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="30" x2="40" y2="70" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="30" x2="50" y2="70" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="30" x2="60" y2="70" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="30" x2="70" y2="70" stroke="#61dafb" stroke-width="1" opacity="0.3"/>
  
  <!-- Main design elements - boxes representing system components -->
  <rect x="32" y="35" width="15" height="12" fill="none" stroke="#61dafb" stroke-width="2" rx="1"/>
  <rect x="53" y="35" width="15" height="12" fill="none" stroke="#61dafb" stroke-width="2" rx="1"/>
  <rect x="32" y="53" width="15" height="12" fill="none" stroke="#61dafb" stroke-width="2" rx="1"/>
  <rect x="53" y="53" width="15" height="12" fill="none" stroke="#61dafb" stroke-width="2" rx="1"/>
  
  <!-- Connection lines between components -->
  <line x1="47" y1="41" x2="53" y2="41" stroke="#61dafb" stroke-width="2"/>
  <line x1="39.5" y1="47" x2="39.5" y2="53" stroke="#61dafb" stroke-width="2"/>
  <line x1="60.5" y1="47" x2="60.5" y2="53" stroke="#61dafb" stroke-width="2"/>
  
  <!-- AI/Brain indicator - small dots -->
  <circle cx="39.5" cy="41" r="1.5" fill="#007bff"/>
  <circle cx="60.5" cy="41" r="1.5" fill="#007bff"/>
  <circle cx="39.5" cy="59" r="1.5" fill="#007bff"/>
  <circle cx="60.5" cy="59" r="1.5" fill="#007bff"/>
</svg>

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/venv
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  default:
    name: system-design-mentor-dev

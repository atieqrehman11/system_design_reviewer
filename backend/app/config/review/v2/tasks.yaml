extract_blueprint_task:
  description: >
    ### STEP 0: INTERNAL MONOLOGUE ###
    PHASE 1 (VALIDATE): Inspect {design_doc}. Your ONLY job here is to check if the document is structurally sufficient for analysis — NOT to evaluate whether the described system is well-designed.

    Set 'is_valid' to False ONLY if ALL of the following are true:
    - The document describes fewer than 2 distinct system components (e.g. services, databases, clients, queues)
    - AND there are no data flows or interactions described between any components
    - AND there is no identifiable system objective or purpose

    CRITICAL: Do NOT set 'is_valid' to False because the described system is missing features like authentication, logging, or error handling. Those are findings for the downstream security and performance agents — not reasons to reject the document. A document describing a system without auth is still a valid document.

    STOP HERE if invalid.

    PHASE 2 (EXTRACT): If valid, analyze the design document provided in the input. Your analysis must follow these Core Directives:
    1. Literal Architecture: Classify the system exactly as described (e.g., if it says Monolith, it is a Monolith).
    2. State Analysis: Identify if storage is local (stateful) or external (stateless).
    3. Protocol Extraction: Trace every line in Mermaid diagrams. If no protocol is mentioned, mark as 'unspecified'.
    4. No Improvements: Purely describe the current state; do not suggest fixes.
    5. Interaction Scope: Only include entries in the interaction_map for communications that cross a process or network boundary (e.g. HTTP, gRPC, TCP, message queues). Do NOT include in-process function calls, method calls between classes, or calls between modules within the same service — these are implementation details, not architectural interactions. In-process calls have no protocol, no trust boundary, and no network latency.
    
    Instructions for Mermaid Parsing:
    - Identify all nodes (e.g., [FE], [BE], [(DB)]).
    - Trace the direction and labels of every arrow.
    
    Design Document to process:
    {design_doc}
  expected_output: >
    A text response containing:
    1. An internal monologue wrapped in <thinking>...</thinking> tags.
    2. strictly formatted JSON object containing:
    - system_identity (name, style, deployment_target, goals)
    - component_registry (list of components with technology, hosting, and statefulness)
    - interaction_map (source-to-destination mapping with protocols and nature)
    - technical_constraints (traffic_expectations as a list of strings, performance_requirements as a list, security_requirements as a list)
    - omission_report (discrepancies between text and diagram)
  agent: librarian

performance_review_task:
  description: >
    Perform a deep-dive performance audit using the provided System Blueprint.

    CRITICAL RULE: Only report on components and technologies that are explicitly present in the blueprint's component_registry and interaction_map. Do NOT invent or assume components (e.g. do not report on MySQL, Redis, or any database unless it appears in the blueprint). If a component is not in the blueprint, it does not exist.

    CRITICAL: If the blueprint context is empty or indicates a validation failure,
    simply output "SKIPPED: Invalid input." and do not perform the analysis.

    Your analysis must focus on these traps — but only where evidence exists in the blueprint:
    1. The Event Loop Trap: Analyze CPU-bound or blocking synchronous work running on the SERVER-SIDE async event loop thread. Browser/client HTTP calls are always asynchronous by nature — do NOT flag client-to-server HTTP calls as event loop issues.
    2. The Statefulness Trap: Evaluate dependencies on local disk or in-process state that prevent horizontal scaling.
    3. The SPOF Trap: Identify components in the blueprint that have no redundancy or failover.

    Quantify risks using technical terminology (e.g., IOPS Saturation, Blocking Operations). Analyze concurrency impacts specifically for "Peak Traffic" scenarios.

    FORMAT DIRECTIVE:
    Write the 'summary' field according to the requested output format: {output_format}
    - If "markdown": use ## headings, **bold** for critical findings, and - for bullet lists
    - If "plain": write clean prose with no Markdown syntax
    - If "json": write a single concise sentence only — the structured bottlenecks and reliability_score fields carry the detail
    Do NOT apply any formatting to structured fields (bottlenecks, scalability_blockers, reliability_score).
      
  expected_output: >
    A JSON object containing:
    - summary: A high-level overview of system readiness, formatted per the FORMAT DIRECTIVE above.
    - bottlenecks: List of specific issues with type, component, observation, impact_at_scale, severity, and technical_remediation.
    - scalability_blockers: Specific reasons why horizontal scaling or Load Balancers cannot be implemented.
    - reliability_score: An object with a 0-100 score and a justification string formatted per the FORMAT DIRECTIVE above.
  async_execution: true
  agent: performance_architect

security_review_task:
  description: >
    Perform a security audit of the provided System Blueprint using the STRIDE framework (Spoofing, Tampering, Repudiation, Information 
    Disclosure, Denial of Service, Elevation of Privilege).
    
    CRITICAL RULE: Only report on components, endpoints, and interactions that are explicitly present in the blueprint's component_registry and interaction_map. Do NOT invent or assume components, routes, storage types, or protocols that are not in the blueprint. Every finding must cite a specific component name or interaction from the blueprint as evidence.

    CRITICAL: If the blueprint context is empty or indicates a validation failure,
    simply output "SKIPPED: Invalid input." and do not perform the analysis.

    Analytical Directives:
    1. Evidence-Based: Every risk must reference a specific component name or interaction key from the blueprint. If you cannot cite one, do not include the finding.
    2. Protocol Analysis: If a protocol is marked 'unspecified' in the interaction_map, flag it as a potential Information Disclosure risk.
    3. Trust Boundaries: Identify interactions in the interaction_map where data crosses trust zones without explicit auth or encryption noted.
    4. Missing Controls: Use the omission_report to identify security-critical controls that are absent from the blueprint.
    
    Refer to the omission_report to identify missing security-critical controls.

    FORMAT DIRECTIVE:
    Write the 'summary' field according to the requested output format: {output_format}
    - If "markdown": use ## headings, **bold** for critical threats, and - for bullet lists
    - If "plain": write clean prose with no Markdown syntax
    - If "json": write a single concise sentence only — the structured vulnerabilities field carries the detail
    Do NOT apply any formatting to structured fields (vulnerabilities, trust_boundary_violations, missing_security_controls).
      
  expected_output: >
    A JSON object containing:
    - summary: High-level risk assessment, formatted per the FORMAT DIRECTIVE above.
    - vulnerabilities: List of threats with STRIDE category, OWASP mapping, 
      attack vector, and mitigation strategy.
    - trust_boundary_violations: List of areas where data moves across security zones.
    - missing_security_controls: Critical omissions identified from the blueprint.
  async_execution: true
  agent: security_architect

final_review_task:
  description: >
    You are receiving the completed outputs of three upstream agents:
    1. The Architectural Librarian — a structured DocBlueprint of the system
    2. The SRE Performance Architect — a PerformanceReview with bottlenecks, scalability blockers, and reliability score
    3. The Offensive Security Architect — a SecurityReview with vulnerabilities, trust boundary violations, and missing controls

    These reports are available in your context. You MUST use them. Do NOT claim data is unavailable if the context contains agent outputs.

    Set 'data_available' to true if the blueprint was valid and upstream agents produced findings.
    Set 'data_available' to false ONLY if the blueprint explicitly has is_valid=false or all upstream reports are empty.

    Analytical Directives:
    1. De-duplication: Compare findings across SRE and Security reports. If both flag the same component, merge them into a single 'Critical Structural Flaw'.
    2. Prioritization: Rank by impact. Security P1 items always take precedence.
    3. Evidence-Only: Only include findings that reference actual components from the blueprint. Discard any finding from upstream agents that references a component not present in the blueprint's component_registry — these are hallucinations and must be filtered out.
    4. Business Translation: Ensure the 'finding' in the audit table is understandable by a CTO.

    FORMAT DIRECTIVE:
    Write the 'deep_dive' field according to the requested output format: {output_format}
    - If "markdown": use ## for section headings, **bold** for critical terms, - for bullet lists, and triple backticks for code or config examples
    - If "plain": write clean prose paragraphs with no Markdown syntax
    - If "json": omit deep_dive entirely (set to null) — the scorecard and findings fields carry the full detail
    Do NOT apply any formatting to structured fields (scorecard, findings, data_available, generated_at).
  
  expected_output: >
    A final ReviewReport (JSON). Ensure 'data_available' reflects the state of the input doc.
    All fields in the Pydantic model must be populated.
    The 'deep_dive' field must follow the FORMAT DIRECTIVE above.
  agent: chief_strategist
